name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Which version to bump?'
        required: true
        type: choice
        options:
          - patch (o.o.X)
          - minor (o.X.0)
          - major (X.o.o)
      title:
        description: 'Short Release title:'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all tags

      - name: Read latest GitHub release
        id: current
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh release view --json tagName -q .tagName)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest release: $VERSION"

      - name: Calculate new version
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "${{ github.event.inputs.bump }}" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bump: $CURRENT → $NEW"

      - name: Update manifest.json
        run: |
          jq --arg v "${{ steps.bump.outputs.version }}" '.version = $v' \
            custom_components/elkbledom/manifest.json > tmp.json
          mv tmp.json custom_components/elkbledom/manifest.json

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/meine_integration/manifest.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

      - name: Create tag
        run: |
          git tag "${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.bump.outputs.version }}"
          name: "ELK-BLEDOM Integration v${{ steps.bump.outputs.version }} - ${{ github.event.inputs.title }}"
          generate_release_notes: true
